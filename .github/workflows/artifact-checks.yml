name: Verify package artifacts

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Install packages using yarn
        run: yarn
      - name: Verify package artifacts
        run: yarn verify:artifacts
