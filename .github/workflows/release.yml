name: Release package

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact version from the top CHANGELOG.md header and package.json
        required: true
        type: string
      confirm_publish:
        description: Type "publish" to confirm npm publish, git tag, and GitHub release creation
        required: true
        type: string

concurrency:
  group: release-package
  cancel-in-progress: false

jobs:
  release:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
    environment:
      name: release
      url: https://www.npmjs.com/package/react-on-rails-rsc
    steps:
      - name: Checkout main
        # actions/checkout@v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: main
          fetch-depth: 0

      - name: Use Node.js
        # actions/setup-node@v4
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          # Node 24 supplies the npm version required for trusted publishing/OIDC;
          # this workflow still runs the full test suite before publishing.
          # Do not enable dependency caching in the release publish job.
          node-version: '24.x'
          registry-url: https://registry.npmjs.org

      - name: Enable Yarn Classic
        run: corepack enable

      - name: Install dependencies
        run: yarn --frozen-lockfile

      - name: Read release metadata
        id: metadata
        env:
          INPUT_VERSION: ${{ inputs.version }}
          CONFIRM_PUBLISH: ${{ inputs.confirm_publish }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const os = require('node:os');
          const path = require('node:path');

          const inputVersion = process.env.INPUT_VERSION;
          const confirmPublish = process.env.CONFIRM_PUBLISH;
          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
          const header = changelog.match(/^## \[([0-9][^\]]*)\] - ([0-9]{4}-[0-9]{2}-[0-9]{2})$/m);

          if (!header) {
            throw new Error('CHANGELOG.md must start its release entries with ## [X.Y.Z] - YYYY-MM-DD.');
          }

          const [, changelogVersion] = header;

          if (confirmPublish !== 'publish') {
            throw new Error('confirm_publish must be exactly "publish".');
          }

          if (inputVersion !== changelogVersion) {
            throw new Error(`workflow_dispatch version ${inputVersion} does not match CHANGELOG.md ${changelogVersion}.`);
          }

          if (packageJson.version !== changelogVersion) {
            throw new Error(`package.json version ${packageJson.version} does not match CHANGELOG.md ${changelogVersion}.`);
          }

          const releaseLines = [];
          let inSection = false;
          for (const line of changelog.split(/\r?\n/)) {
            if (line === header[0]) {
              inSection = true;
              continue;
            }

            if (inSection && /^## \[[0-9]/.test(line)) {
              break;
            }

            if (inSection) {
              releaseLines.push(line);
            }
          }

          const notes = releaseLines.join(os.EOL).trim();
          if (!notes) {
            throw new Error(`CHANGELOG.md has no release notes for ${changelogVersion}.`);
          }

          const notesPath = path.join(process.env.RUNNER_TEMP, 'release-notes.md');
          fs.writeFileSync(notesPath, `${notes}${os.EOL}`);

          const isPrerelease = changelogVersion.includes('-');
          const output = [
            `package=${packageJson.name}`,
            `version=${changelogVersion}`,
            `npm_tag=${isPrerelease ? 'next' : 'latest'}`,
            `is_prerelease=${isPrerelease ? 'true' : 'false'}`,
            `notes_path=${notesPath}`,
          ].join(os.EOL);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `${output}${os.EOL}`);
          NODE

      - name: Validate release ref and publish state
        env:
          PACKAGE_NAME: ${{ steps.metadata.outputs.package }}
          RELEASE_VERSION: ${{ steps.metadata.outputs.version }}
          NPM_VIEW_OUTPUT: ${{ runner.temp }}/npm-view.out
        run: |
          set -euo pipefail

          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "Releases must be dispatched from main; current ref is $GITHUB_REF." >&2
            exit 1
          fi

          node --version
          npm --version
          git diff --quiet
          git diff --cached --quiet

          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_VERSION}" >/dev/null 2>&1; then
            echo "Release tag ${RELEASE_VERSION} already exists on origin." >&2
            exit 1
          fi

          # npm view exits non-zero with E404 when the version does not exist.
          # Any other non-zero exit (network error, auth failure, etc.) should fail the release.
          if npm view "${PACKAGE_NAME}@${RELEASE_VERSION}" version --json >"$NPM_VIEW_OUTPUT" 2>&1; then
            echo "${PACKAGE_NAME}@${RELEASE_VERSION} is already published." >&2
            cat "$NPM_VIEW_OUTPUT" >&2
            exit 1
          fi

          if ! grep -q 'E404' "$NPM_VIEW_OUTPUT"; then
            cat "$NPM_VIEW_OUTPUT" >&2
            exit 1
          fi

      - name: Run release validation
        run: |
          set -euo pipefail

          yarn test

          if node -e "process.exit(require('./package.json').scripts['verify:artifacts'] ? 0 : 1)"; then
            yarn verify:artifacts
          else
            yarn run build
            npm pack --dry-run
          fi

          git diff --quiet
          git diff --cached --quiet

      - name: Publish to npm with provenance
        env:
          NPM_TAG: ${{ steps.metadata.outputs.npm_tag }}
        run: npm publish --provenance --access public --tag "$NPM_TAG"

      - name: Create local release tag
        env:
          RELEASE_VERSION: ${{ steps.metadata.outputs.version }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$RELEASE_VERSION" -m "Release $RELEASE_VERSION" HEAD

      - name: Push tag and create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ steps.metadata.outputs.version }}
          RELEASE_NOTES_PATH: ${{ steps.metadata.outputs.notes_path }}
          IS_PRERELEASE: ${{ steps.metadata.outputs.is_prerelease }}
        run: |
          set -euo pipefail

          git push origin "refs/tags/${RELEASE_VERSION}"

          release_args=(--title "$RELEASE_VERSION" --notes-file "$RELEASE_NOTES_PATH" --target "$(git rev-parse HEAD)")
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            release_args+=(--prerelease)
          fi

          gh release create "$RELEASE_VERSION" "${release_args[@]}"

      - name: Verify published release
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_NAME: ${{ steps.metadata.outputs.package }}
          RELEASE_VERSION: ${{ steps.metadata.outputs.version }}
        run: |
          set -euo pipefail

          npm view "${PACKAGE_NAME}@${RELEASE_VERSION}" version
          npm view "$PACKAGE_NAME" dist-tags --json
          gh release view "$RELEASE_VERSION"
